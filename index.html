<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>반도체 사이클 · Polaris</title>
<meta name="description" content="핵심 반도체 성장률 지표를 출처별로 각각 추적하고, 그 위에 통합 해석을 얹는다.">
<style>
  :root{
    --bg:#0b0d14; --bg2:#0f1117; --panel:#161a24; --panel2:#1d2230; --line:#272d3c;
    --txt:#e8eaf0; --muted:#9aa3b2; --faint:#69727f;
    --accent:#8b9bff; --accent-dim:#5b6bd6; --gold:#ffd66b;
    --go:#22c55e; --stop:#ef4444;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Segoe UI",sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:920px;margin:0 auto;padding:22px 20px 60px}
  .backlink{display:inline-block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:16px}
  .backlink:hover{color:var(--accent)}
  h1{font-size:24px;font-weight:800;letter-spacing:-.4px;margin:0}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .updated{font-size:11.5px;color:var(--faint);margin-top:8px;font-variant-numeric:tabular-nums}
  .updated b{color:var(--muted);font-weight:600}

  /* 통합 해석 배너 */
  .verdict{margin:22px 0 8px;border:1px solid var(--line);border-radius:16px;background:var(--panel);
    padding:18px 20px;position:relative;overflow:hidden}
  .verdict .vtop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .regime{font-size:15px;font-weight:800;padding:6px 14px;border-radius:10px;letter-spacing:-.2px}
  .regime .en{font-size:11px;font-weight:700;opacity:.7;margin-left:7px;text-transform:uppercase;letter-spacing:1px}
  .tally{font-size:12px;color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums}
  .headline{font-size:15px;color:var(--txt);margin-top:13px;font-weight:600;line-height:1.55}
  .bullets{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .chip{font-size:12px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);
    border-radius:8px;padding:5px 10px;display:flex;align-items:center;gap:7px}
  .chip b{color:var(--txt);font-weight:700}
  .chip .st{font-size:10.5px;padding:1px 6px;border-radius:5px;font-weight:700}

  /* 20일 잠정 속보 */
  .prelim{margin:14px 0 8px;border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:15px 17px}
  .prelim .ph{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:13px}
  .prelim .ph .t{font-size:13px;font-weight:800;letter-spacing:.2px}
  .prelim .ph .badge2{font-size:10px;font-weight:800;color:var(--gold);background:rgba(255,214,107,.12);padding:2px 7px;border-radius:6px}
  .prelim .ph .as{font-size:11.5px;color:var(--faint);font-variant-numeric:tabular-nums}
  .prelim .ph .src{font-size:11px;color:var(--faint);margin-left:auto}
  .prelim .ph .src:hover{color:var(--accent)}
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  @media(max-width:640px){.pgrid{grid-template-columns:1fr 1fr}}
  .pitem{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 12px}
  .pitem.hl{border-color:var(--accent-dim)}
  .pitem .pl{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
  .pitem .pl .star{color:var(--gold);font-size:10px}
  .pitem .py{font-size:22px;font-weight:800;letter-spacing:-.6px;color:var(--go);margin-top:5px;font-variant-numeric:tabular-nums}
  .pitem .py .u{font-size:10.5px;color:var(--faint);font-weight:700;margin-left:3px}
  .pitem .pm{font-size:11.5px;font-weight:700;margin-top:3px;font-variant-numeric:tabular-nums}
  .prelim .pnote{font-size:11px;color:var(--faint);margin-top:12px;line-height:1.6}

  .shead{display:flex;align-items:center;gap:10px;margin:30px 0 13px}
  .shead .ttl{font-size:13px;font-weight:800;color:var(--txt);letter-spacing:.2px}
  .shead .desc{font-size:11.5px;color:var(--faint)}
  .shead .ln{flex:1;height:1px;background:var(--line)}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:640px){.cards{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:14px;background:var(--panel);padding:16px 17px;
    display:flex;flex-direction:column;min-height:190px}
  .card.dim{opacity:.6}
  .card .crole{font-size:11px;color:var(--faint);font-weight:600}
  .card h3{font-size:15.5px;font-weight:800;margin:3px 0 0;letter-spacing:-.2px}
  .card .val{display:flex;align-items:center;gap:8px;margin-top:11px}
  .card .num{font-size:30px;font-weight:800;letter-spacing:-1px;font-variant-numeric:tabular-nums;line-height:1}
  .card .unit{font-size:12px;color:var(--faint);font-weight:700}
  .card .phase{font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:8px;
    margin-left:auto;align-self:center;letter-spacing:-.1px;white-space:nowrap}
  .card .mom{font-size:11.5px;color:var(--muted);margin-top:8px;font-variant-numeric:tabular-nums;letter-spacing:-.1px}
  .card .mom b{font-weight:800}
  .card .spark{margin-top:auto;padding-top:12px}
  .card canvas{width:100%;height:56px;display:block}
  .card .foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;
    font-size:11px;color:var(--faint)}
  .card .src:hover{color:var(--accent)}
  .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.2px}
  .b-auto{color:var(--go);background:rgba(34,197,94,.1)}
  .b-key{color:var(--gold);background:rgba(255,214,107,.1)}
  .b-manual{color:var(--accent);background:rgba(139,155,255,.1)}
  .b-err{color:var(--stop);background:rgba(239,68,68,.1)}
  .pend{font-size:22px;font-weight:800;color:var(--faint);margin-top:11px}

  .foot-note{margin-top:34px;font-size:11.5px;color:var(--faint);line-height:1.7;
    border-top:1px solid var(--line);padding-top:16px}
  .foot-note b{color:var(--muted);font-weight:600}
</style>
</head>
<body>
<div class="wrap">
  <a class="backlink" href="/">← Polaris 허브</a>
  <h1>반도체 사이클</h1>
  <div class="sub">핵심 성장률 지표를 출처별로 <b style="color:var(--txt)">각각</b> 추적 · 그 위에 통합 해석 한 층</div>
  <div class="updated" id="updated">불러오는 중…</div>

  <div id="verdict"></div>

  <div id="prelim"></div>

  <div class="shead" style="margin-top:26px">
    <span class="ttl">성장률 (펀더멘털)</span>
    <span class="desc">수요·매출·생산</span>
    <span class="ln"></span>
  </div>
  <div class="cards" id="growth"></div>

  <div class="shead">
    <span class="ttl">시장 신호</span>
    <span class="desc">주가가 선반영하는 사이클</span>
    <span class="ln"></span>
  </div>
  <div class="cards" id="market"></div>

  <div class="foot-note" id="note"></div>
</div>

<script>
(function(){
  function render(){
  var D = window.SEMI_DATA;
  if(!D){ document.getElementById('updated').textContent = 'data.js 로드 실패 — refresh.py를 먼저 실행하세요.'; return; }

  var TONE = {
    pos:      {c:'var(--go)',     bg:'rgba(34,197,94,.13)'},
    warn:     {c:'var(--gold)',   bg:'rgba(255,214,107,.13)'},
    'warn-pos':{c:'var(--accent)',bg:'rgba(139,155,255,.13)'},
    neg:      {c:'var(--stop)',   bg:'rgba(239,68,68,.13)'},
    neutral:  {c:'var(--muted)',  bg:'var(--panel2)'}
  };
  var STATUS = {
    'auto':         {t:'자동', cls:'b-auto'},
    'manual':       {t:'수동', cls:'b-manual'},
    'pending-key':  {t:'키 발급 후 활성화', cls:'b-key'},
    'pending-input':{t:'월 1회 수동 입력', cls:'b-manual'},
    'error':        {t:'수집 오류', cls:'b-err'}
  };

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function fmt(v){ return (v>=0?'+':'') + v; }
  function sp(x){ return (x>=0?'+':'') + x.toFixed(1); }
  function dcol(x){ return x>0.3?'var(--go)':(x<-0.3?'var(--stop)':'var(--muted)'); }

  // ── 갱신 시각
  var g = D.generatedAt || '';
  document.getElementById('updated').innerHTML = '갱신 <b>'+esc(g.slice(0,16).replace('T',' '))+' UTC</b>';

  // ── 통합 해석
  var iv = D.interpretation, tone = TONE[iv.tone] || TONE.neutral;
  var chips = iv.bullets.map(function(b){
    var bt = TONE[b.tone] || TONE.neutral;
    var ph = b.phase ? '<span class="st" style="color:'+bt.c+';background:'+bt.bg+'">'+esc(b.phase)+'</span>' : '';
    return '<span class="chip"><b>'+esc(b.label)+'</b> '+fmt(b.value)+'% '+esc(b.unit)+' '+ph+'</span>';
  }).join('');
  document.getElementById('verdict').innerHTML =
    '<div class="verdict">'+
      '<div class="vtop">'+
        '<span class="regime" style="color:'+tone.c+';background:'+tone.bg+'">'+esc(iv.regime)+
          '<span class="en">'+esc(iv.regimeEn)+'</span></span>'+
        '<span class="tally">성장 '+iv.growthLive+'/'+iv.growthTotal+' 라이브 · 시장 '+iv.marketLive+
          (iv.pendingCount?' · 대기 '+iv.pendingCount+'('+esc((iv.pendingNames||[]).join('·'))+')':'')+'</span>'+
      '</div>'+
      '<div class="headline">'+esc(iv.headline)+'</div>'+
      (chips?'<div class="bullets">'+chips+'</div>':'')+
    '</div>';

  // ── 20일 잠정 속보 (관세청, 가장 빠른 신호)
  var pr = D.prelim;
  if(pr && pr.items && pr.items.length){
    var pitems = pr.items.map(function(it){
      var mc = it.mom>=15?'var(--go)':(it.mom>=5?'var(--muted)':'var(--gold)');
      return '<div class="pitem'+(it.hl?' hl':'')+'">'+
        '<div class="pl">'+(it.hl?'<span class="star">★</span>':'')+esc(it.label)+'</div>'+
        '<div class="py">'+fmt(it.yoy)+'%<span class="u">Y/Y</span></div>'+
        '<div class="pm" style="color:'+mc+'">M/M '+fmt(it.mom)+'%</div>'+
      '</div>';
    }).join('');
    document.getElementById('prelim').innerHTML =
      '<div class="prelim">'+
        '<div class="ph">'+
          '<span class="t">20일 잠정 속보</span>'+
          '<span class="badge2">잠정</span>'+
          '<span class="as">'+esc(pr.asOf||'')+'</span>'+
          '<a class="src" href="'+esc(pr.sourceUrl||'#')+'" target="_blank" rel="noopener">'+esc(pr.source||'관세청')+' ↗</a>'+
        '</div>'+
        '<div class="pgrid">'+pitems+'</div>'+
        '<div class="pnote">관세청 1~20일 잠정치 — ECOS 월별 확정치보다 ~10일 빠른 한국 반도체 선행 신호. ★=메모리 핵심. M/M가 직전월 모멘텀(낮으면 금색).</div>'+
      '</div>';
  }

  // ── 카드 렌더
  function card(i){
    var dim = i.value===null ? ' dim' : '';
    var stt = STATUS[i.status] || STATUS.auto;
    var valBlock;
    if(i.value===null){
      valBlock = '<div class="pend">—</div>';
    }else{
      var m = i.mom, phaseChip = '', momLine = '';
      if(m){
        var mt = TONE[m.tone] || TONE.neutral;
        phaseChip = '<span class="phase" style="color:'+mt.c+';background:'+mt.bg+'">'+esc(m.phase)+'</span>';
        var ref = (m.level >= 0)
          ? '정점 '+esc(m.peakTime)+' 대비 <b style="color:'+dcol(m.fromPeak)+'">'+sp(m.fromPeak)+'%p</b>'
          : '저점 '+esc(m.troughTime)+' 대비 <b style="color:'+dcol(m.fromTrough)+'">'+sp(m.fromTrough)+'%p</b>';
        var pL = (i.period==='Q') ? {s:'직전분기', t:'3분기'} : {s:'직전월', t:'3M'};
        momLine =
          '<div class="mom">'+pL.s+' <b style="color:'+dcol(m.mom)+'">'+sp(m.mom)+'%p</b>'+
          ' · '+pL.t+' <b style="color:'+dcol(m.slope3)+'">'+sp(m.slope3)+'%p</b>'+
          ' · '+ref+'</div>';
      }
      valBlock =
        '<div class="val"><span class="num">'+fmt(i.value)+'</span><span class="unit">% '+esc(i.unit)+'</span>'+phaseChip+'</div>'+
        momLine;
    }
    var canvasId = 'sp_'+i.id;
    return '<div class="card'+dim+'">'+
      '<div class="crole">'+esc(i.role)+'</div>'+
      '<h3>'+esc(i.label)+'</h3>'+
      valBlock+
      '<div class="spark"><canvas id="'+canvasId+'"></canvas></div>'+
      '<div class="foot">'+
        '<a class="src" href="'+esc(i.sourceUrl)+'" target="_blank" rel="noopener">'+esc(i.source)+' ↗</a>'+
        '<span class="badge '+stt.cls+'">'+esc(stt.t)+(i.asOf?' · '+esc(i.asOf):'')+'</span>'+
      '</div>'+
    '</div>';
  }

  var growth = D.indicators.filter(function(i){return i.group==='growth';});
  var market = D.indicators.filter(function(i){return i.group==='market';});
  document.getElementById('growth').innerHTML = growth.map(card).join('');
  document.getElementById('market').innerHTML = market.map(card).join('');

  // ── 차트: 0선(점선) · 중립 본선 · 정점 금색 링 · 마지막 구간 방향색 · 끝점
  function spark(i){
    var cv = document.getElementById('sp_'+i.id);
    if(!cv || !i.history || i.history.length<2) return;
    var m = i.mom || {};
    var dpr = window.devicePixelRatio||1, w = cv.clientWidth, h = 56;
    cv.width = w*dpr; cv.height = h*dpr;
    var ctx = cv.getContext('2d'); ctx.scale(dpr,dpr);
    var vs = i.history.map(function(p){return p.v;});
    var min = Math.min.apply(null,vs), max = Math.max.apply(null,vs);
    var lo = Math.min(min,0), hi = Math.max(max,0), rng = (hi-lo)||1;
    var pT=7, pB=5, pR=3;
    function X(k){return (k/(vs.length-1))*(w-2-pR)+1;}
    function Y(v){return h-pB - ((v-lo)/rng)*(h-pT-pB);}
    var last = vs.length-1;
    var turn = (m.mom>0.3)?'#22c55e':(m.mom<-0.3?'#ef4444':'#9aa3b2');  // 직전월 방향
    // 0선 (점선)
    if(lo<0 && hi>0){ ctx.save(); ctx.strokeStyle='#3a4254'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.beginPath(); ctx.moveTo(0,Y(0)); ctx.lineTo(w,Y(0)); ctx.stroke(); ctx.restore(); }
    // 본선 (중립) + 영역
    ctx.beginPath(); ctx.moveTo(X(0),Y(vs[0]));
    for(var k=1;k<vs.length;k++) ctx.lineTo(X(k),Y(vs[k]));
    ctx.strokeStyle='#5b6bd6'; ctx.lineWidth=1.5; ctx.lineJoin='round'; ctx.stroke();
    ctx.lineTo(X(last),Y(lo)); ctx.lineTo(X(0),Y(lo)); ctx.closePath();
    ctx.globalAlpha=.07; ctx.fillStyle='#5b6bd6'; ctx.fill(); ctx.globalAlpha=1;
    // 마지막 구간 (직전월 방향색, 굵게)
    if(last>=1){ ctx.beginPath(); ctx.moveTo(X(last-1),Y(vs[last-1])); ctx.lineTo(X(last),Y(vs[last]));
      ctx.strokeStyle=turn; ctx.lineWidth=2.6; ctx.lineCap='round'; ctx.stroke(); }
    // 정점 링 (금색) — 끝점과 겹치면 '신고점' 의미
    if(m.peakIdx!=null){ ctx.beginPath(); ctx.arc(X(m.peakIdx),Y(vs[m.peakIdx]),3.2,0,7);
      ctx.strokeStyle='#ffd66b'; ctx.lineWidth=1.6; ctx.stroke(); }
    // 끝점
    ctx.beginPath(); ctx.arc(X(last),Y(vs[last]),2.8,0,7); ctx.fillStyle=turn; ctx.fill();
  }
  D.indicators.forEach(spark);
  window.addEventListener('resize', function(){ D.indicators.forEach(spark); });

  document.getElementById('note').innerHTML =
    '<b>읽는 법.</b> 핵심은 <b>레벨이 아니라 방향</b>입니다. <b>국면 칩</b> = 빠른 판정, '+
    '<b>직전월 Δ</b>(가장 빠른 신호) · <b>3M 기울기</b>(추세) · <b>정점 대비</b>(꺾였는지) = 정밀 수치. '+
    '<b>“가속 둔화”</b>는 3M는 상승인데 직전월이 꺾인 <b>조기 경보</b>입니다.<br>'+
    '<b>차트.</b> 점선=0선, <span style="color:var(--gold)">금색 링</span>=최근 정점, '+
    '<span style="color:var(--go)">초록</span>/<span style="color:var(--stop)">빨강</span> 끝구간=직전월 방향(링과 끝점이 겹치면 신고점).<br>'+
    '<b>데이터.</b> 한국수출·FRED·SOX 자동 갱신, WSTS·DRAM은 월 1회 수동. 상단 해석은 점수 합산이 아닌 규칙 기반 국면 판정. · '+esc(D.note||'');
  }
  // data.js 를 매 로드마다 새로 받아 index.html 과 항상 동기화 (캐시 불일치 방지)
  var s = document.createElement('script');
  s.src = 'data.js?ts=' + Date.now();
  s.onload = render;
  s.onerror = function(){ var u = document.getElementById('updated'); if(u) u.textContent = 'data.js 로드 실패'; };
  document.head.appendChild(s);
})();
</script>
</body>
</html>
