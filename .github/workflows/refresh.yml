name: Semiconductor cycle refresh

on:
  schedule:
    # Cron is UTC. SOX는 매 거래일, 펀더멘털(FRED/한국수출)은 월초 갱신.
    - cron: "0 22 * * 2-6"   # 美 장마감 후 (SOX 일간)
    - cron: "0 8 1-5 * *"    # 매월 1~5일 아침 (FRED·수출 월간치 반영)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: semi-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Collect indicators
        env:
          # 한국 수출 자동화를 켜려면 repo Secrets 에 ECOS_API_KEY (+ STAT/ITEM) 추가
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          ECOS_SEMI_STAT: ${{ secrets.ECOS_SEMI_STAT }}
          ECOS_SEMI_ITEM: ${{ secrets.ECOS_SEMI_ITEM }}
        run: |
          # yfinance/FRED 소스가 간헐적으로 불안정 → 3회 재시도.
          for attempt in 1 2 3; do
            echo "::group::refresh attempt $attempt"
            if uv run python refresh.py; then
              echo "::endgroup::"; echo "ok on attempt $attempt"; exit 0
            fi
            echo "::endgroup::"; echo "attempt $attempt failed"
            [ "$attempt" -lt 3 ] && sleep 60
          done
          echo "all attempts failed"; exit 1

      - name: Commit & push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js data.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git pull --rebase --autostash origin main || true
            git push
          fi
